# Full local stack: `docker compose up` runs Postgres AND the web app.
# web builds the Next.js image, waits for a healthy DB, applies the
# Prisma schema, and serves http://localhost:3000. (.env's localhost
# DATABASE_URL is for host-side tooling; the web container uses `db`.)
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_showcase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_showcase"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/agent_showcase?schema=public"
    ports:
      - "3000:3000"
    # apply the schema on boot, then serve the production build
    command: sh -c "pnpm prisma db push --skip-generate && pnpm start"

volumes:
  pgdata:
